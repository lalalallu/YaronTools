name: Build and Package

on:
  push:
    branches: [ "main", "master", "develop" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
        python-version: ["3.8"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libgl1 \
            libegl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/src \
            -e QT_DEBUG_PLUGINS=1 \
            ubuntu:20.04 \
            bash -c "
              apt-get update -qq &&
              apt-get install -y -qq \
                python3.8 python3-pip python3-venv \
                libgl1 libegl1 \
                libxcb-cursor0 libxcb-xinerama0 \
                libxcb-icccm4 libxcb-image0 \
                libxcb-keysyms1 libxcb-render-util0 \
                libxkbcommon-x11-0 \
                libdbus-1-3 libfontconfig1 &&
              python3.8 -m venv /venv &&
              /venv/bin/pip install --upgrade pip -q &&
              /venv/bin/pip install -r requirements.txt -q &&
              /venv/bin/pyinstaller --name 'YaronTools' \
                --windowed --onefile --clean \
                --hidden-import 'PyQt6.sip' \
                --hidden-import 'asyncssh' \
                --collect-all PyQt6 \
                main.py
            "

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd src
          pyinstaller --name "YaronTools" \
                      --windowed \
                      --onefile \
                      --clean \
                      --hidden-import "PyQt6.sip" \
                      --hidden-import "asyncssh" \
                      --collect-all PyQt6 \
                      main.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YaronTools-${{ runner.os }}-py${{ matrix.python-version }}
          path: src/dist/YaronTools*

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: YaronTools-*/*
          generate_release_notes: true
